<!DOCTYPE html>
<html lang="en">
<head>
    <title>Fake News Detector</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: url("{{ url_for('static', filename='bg.jpg') }}") no-repeat center/cover;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        body::before {
            content: "";
            position: absolute;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(5px);
        }

        .container {
            position: relative;
            background: rgba(255,255,255,0.9);
            padding: 20px;
            border-radius: 15px;
            width: 90%;
            max-width: 400px;
            text-align: center;
        }

        textarea, input {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            border-radius: 10px;
            border: none;
        }

        button {
            margin-top: 15px;
            padding: 10px;
            border-radius: 20px;
            border: none;
            background: #5a67d8;
            color: white;
            cursor: pointer;
        }

        .result {
            margin-top: 15px;
            font-weight: bold;
        }

        .fake { color: red; }
        .real { color: green; }

        .bar {
            background: #ddd;
            border-radius: 10px;
            margin-top: 10px;
        }

        .fill {
            background: green;
            padding: 5px;
            border-radius: 10px;
            color: white;
        }

        ul {
            text-align: left;
        }
    </style>
</head>

<body>

<div class="container">
    <h2>📰 Fake News Detector</h2>

    <form method="POST">
        <textarea name="news" rows="4" placeholder="Enter news text..."></textarea>

        <p>OR</p>

        <input type="text" name="url" placeholder="Paste news URL...">

        <button type="submit">Check</button>
    </form>

    {% if result %}
        <div class="result {% if result == 'FAKE' %}fake{% else %}real{% endif %}">
            Result: {{ result }} <br>
            Confidence: {{ confidence }}%
        </div>

        <div class="bar">
            <div class="fill" style="width: {{ confidence }}%">
                {{ confidence }}%
            </div>
        </div>

        {% if result == 'FAKE' %}
            <p style="color:red;">⚠️ This content may be misleading.</p>
        {% endif %}
    {% endif %}

    <h3>History</h3>
    <ul>
        {% for item in history %}
            <li>{{ item[0] }} - {{ item[1] }}</li>
        {% endfor %}
    </ul>
</div>

</body>
</html>
